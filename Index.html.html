<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPro — Premium Fitness & Personal Training</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            body: ['DM Sans', 'sans-serif']
          },
          colors: {
            bg: '#0a0a0a',
            surface: '#141414',
            accent: '#C8FF00',
            orange: '#FF3B00',
            text: '#F2F2F2',
            muted: '#6B6B6B',
            border: '#2A2A2A'
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --accent: #C8FF00;
      --orange: #FF3B00;
      --text: #F2F2F2;
      --muted: #6B6B6B;
      --border: #2A2A2A;
    }

    * { scroll-behavior: smooth; box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    .fade-in-section {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity .7s cubic-bezier(.25,.46,.45,.94), transform .7s cubic-bezier(.25,.46,.45,.94);
    }

    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .program-card,
    .coach-card,
    .pricing-card {
      transition: all .35s cubic-bezier(.25,.46,.45,.94);
      border: 1px solid var(--border);
    }

    .program-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 0 40px rgba(200,255,0,.1), 0 20px 40px rgba(0,0,0,.4);
    }

    .coach-card:hover {
      transform: scale(1.03);
      border-color: rgba(200,255,0,.35);
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }

    .pricing-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,.5);
    }

    .pricing-card.featured {
      border: 2px solid var(--accent);
      position: relative;
    }

    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(12px); }
    }

    .scroll-indicator { animation: bounceDown 1.8s ease-in-out infinite; }

    .cta-pattern {
      background-image: radial-gradient(circle, rgba(0,0,0,.15) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .placeholder-img {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 30%, #1a1a1a 60%, #0d0d0d 100%);
      position: relative;
      overflow: hidden;
    }

    .placeholder-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(200,255,0,.03) 50%, transparent 100%);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: .3; }
      50% { opacity: .7; }
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      .testimonials-scroll {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 16px;
        padding-bottom: 16px;
        -webkit-overflow-scrolling: touch;
      }

      .testimonials-scroll > * {
        flex: 0 0 85vw;
        scroll-snap-align: start;
      }

      .testimonials-scroll::-webkit-scrollbar { height: 4px; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const scrollToSection = (id) => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    };

    const useInView = (options = {}) => {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const element = ref.current;
        if (!element) return;

        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsInView(true);
              if (options.once !== false) observer.unobserve(element);
            } else if (options.once === false) {
              setIsInView(false);
            }
          },
          {
            threshold: options.threshold || 0.15,
            rootMargin: options.rootMargin || '0px 0px -50px 0px'
          }
        );

        observer.observe(element);
        return () => observer.disconnect();
      }, [options.threshold, options.rootMargin, options.once]);

      return [ref, isInView];
    };

    const useCountUp = (target, duration = 2000, startCounting = false) => {
      const [count, setCount] = useState(0);
      const rafRef = useRef(null);
      const startTimeRef = useRef(null);

      useEffect(() => {
        if (!startCounting) {
          setCount(0);
          return;
        }

        const animate = (timestamp) => {
          if (!startTimeRef.current) startTimeRef.current = timestamp;

          const elapsed = timestamp - startTimeRef.current;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);

          setCount(Math.floor(eased * target));

          if (progress < 1) {
            rafRef.current = requestAnimationFrame(animate);
          } else {
            setCount(target);
          }
        };

        rafRef.current = requestAnimationFrame(animate);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          startTimeRef.current = null;
        };
      }, [target, duration, startCounting]);

      return count;
    };

    const FadeInSection = ({ children, className = '', id = '' }) => {
      const [ref, isInView] = useInView({ threshold: 0.1 });

      return (
        <section
          id={id}
          ref={ref}
          className={`fade-in-section ${isInView ? 'is-visible' : ''} ${className}`}
        >
          {children}
        </section>
      );
    };

    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const goTo = (id) => {
        setMobileOpen(false);
        scrollToSection(id);
      };

      const navLinks = [
        { label: 'About', id: 'about' },
        { label: 'Programs', id: 'programs' },
        { label: 'Coaches', id: 'coaches' },
        { label: 'Pricing', id: 'pricing' },
        { label: 'Contact', id: 'contact' }
      ];

      return (
        <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${
          scrolled ? 'bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-[#2A2A2A] py-3' : 'bg-transparent py-5'
        }`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <button
              onClick={() => goTo('hero')}
              className="flex items-center gap-1.5 group cursor-pointer bg-transparent border-none p-0"
              aria-label="Go to hero section"
            >
              <span className="font-display text-3xl sm:text-4xl tracking-tight text-[#F2F2F2] group-hover:text-white transition-colors">
                FIT PRO
              </span>
              <span className="w-2 h-2 rounded-full bg-[#C8FF00] inline-block ml-1 animate-pulse"></span>
            </button>

            <div className="hidden md:flex items-center gap-8">
              {navLinks.map((link) => (
                <button
                  key={link.id}
                  onClick={() => goTo(link.id)}
                  className="text-sm uppercase tracking-widest text-[#6B6B6B] hover:text-[#C8FF00] transition-colors duration-200 font-body cursor-pointer bg-transparent border-none"
                >
                  {link.label}
                </button>
              ))}

              <button
                onClick={() => goTo('pricing')}
                className="ml-4 px-6 py-2.5 bg-[#FF3B00] text-white font-body font-semibold text-sm uppercase tracking-wider rounded hover:bg-[#e63500] transition-all duration-200 hover:shadow-lg hover:shadow-[#FF3B00]/25 cursor-pointer border-none"
              >
                Get Started
              </button>
            </div>

            <button
              onClick={() => setMobileOpen(!mobileOpen)}
              className="md:hidden flex flex-col gap-1.5 p-2 cursor-pointer bg-transparent border-none z-50 relative"
              aria-label="Toggle menu"
            >
              <span className={`block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
              <span className={`block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? 'opacity-0' : ''}`}></span>
              <span className={`block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
            </button>
          </div>

          <div className={`fixed inset-0 bg-[#0a0a0a]/98 backdrop-blur-xl z-40 flex flex-col items-center justify-center gap-8 transition-all duration-300 md:hidden ${
            mobileOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'
          }`}>
            {navLinks.map((link) => (
              <button
                key={link.id}
                onClick={() => goTo(link.id)}
                className="text-2xl uppercase tracking-widest text-[#F2F2F2] hover:text-[#C8FF00] transition-colors font-display cursor-pointer bg-transparent border-none"
              >
                {link.label}
              </button>
            ))}

            <button
              onClick={() => goTo('pricing')}
              className="mt-4 px-8 py-3 bg-[#FF3B00] text-white font-body font-semibold text-lg uppercase tracking-wider rounded cursor-pointer border-none hover:bg-[#e63500] transition-colors"
            >
              Get Started
            </button>
          </div>
        </nav>
      );
    };

    const HeroSection = () => {
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const heroRef = useRef(null);

      const handleMouseMove = useCallback((e) => {
        if (!heroRef.current) return;

        const rect = heroRef.current.getBoundingClientRect();

        setMousePos({
          x: (e.clientX - rect.left) / rect.width - 0.5,
          y: (e.clientY - rect.top) / rect.height - 0.5
        });
      }, []);

      return (
        <section
          id="hero"
          ref={heroRef}
          onMouseMove={handleMouseMove}
          className="relative min-h-screen flex items-center justify-center overflow-hidden bg-[#0a0a0a]"
        >
          <div className="noise-overlay"></div>

          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <div
              className="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full opacity-[0.07]"
              style={{
                background: 'radial-gradient(circle, #C8FF00 0%, transparent 70%)',
                transform: `translate(${mousePos.x * 30}px, ${mousePos.y * 30}px)`,
                transition: 'transform .3s ease-out'
              }}
            ></div>

            <div
              className="absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full opacity-[0.05]"
              style={{
                background: 'radial-gradient(circle, #FF3B00 0%, transparent 70%)',
                transform: `translate(${mousePos.x * -20}px, ${mousePos.y * -20}px)`,
                transition: 'transform .3s ease-out'
              }}
            ></div>
          </div>

          <div className="relative z-10 text-center px-4 max-w-5xl mx-auto">
            <h1 className="font-display text-6xl sm:text-7xl md:text-8xl lg:text-9xl leading-[0.85] tracking-tight text-[#F2F2F2] mb-6">
              TRAIN LIKE <br />
              <span className="text-[#C8FF00]">IT MATTERS</span>
            </h1>

            <p className="text-lg sm:text-xl md:text-2xl text-[#6B6B6B] font-body max-w-2xl mx-auto mb-10 leading-relaxed">
              Results-driven coaching for serious athletes and ambitious beginners.
            </p>

            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
              <button
                onClick={() => scrollToSection('pricing')}
                className="px-8 py-4 bg-[#FF3B00] text-white font-body font-semibold text-base uppercase tracking-wider rounded cursor-pointer border-none hover:bg-[#e63500] transition-all duration-200 hover:shadow-xl hover:shadow-[#FF3B00]/30 hover:-translate-y-0.5"
              >
                Start Your Journey
              </button>

              <button
                onClick={() => scrollToSection('about')}
                className="px-8 py-4 bg-transparent border-2 border-[#F2F2F2]/30 text-[#F2F2F2] font-body font-semibold text-base uppercase tracking-wider rounded cursor-pointer hover:border-[#C8FF00] hover:text-[#C8FF00] transition-all duration-200 flex items-center gap-2"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5,3 19,12 5,21" />
                </svg>
                Watch Story
              </button>
            </div>

            <div className="inline-flex items-center gap-2 mt-12 px-5 py-3 bg-[#141414] border border-[#2A2A2A] rounded-full text-sm font-body">
              <span className="w-2.5 h-2.5 rounded-full bg-[#C8FF00] animate-pulse"></span>
              <span className="text-[#6B6B6B]">
                <span className="text-[#C8FF00] font-semibold">500+</span> Members Transformed
              </span>
            </div>
          </div>

          <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 scroll-indicator">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6B6B6B" strokeWidth="2" strokeLinecap="round">
              <polyline points="6,9 12,15 18,9" />
            </svg>
          </div>
        </section>
      );
    };

    const StatItem = ({ target, suffix, label, format, startCounting }) => {
      const count = useCountUp(target, 2000, startCounting);
      const display = format ? count.toLocaleString() : count;

      return (
        <div className="flex flex-col items-center gap-2">
          <span className="font-display text-4xl sm:text-5xl md:text-6xl text-[#C8FF00] tracking-tight">
            {display}{suffix}
          </span>
          <span className="text-sm uppercase tracking-widest text-[#6B6B6B] font-body">{label}</span>
        </div>
      );
    };

    const StatsBar = () => {
      const [ref, isInView] = useInView({ threshold: 0.3 });

      const stats = [
        { target: 500, suffix: '+', label: 'Members', format: true },
        { target: 12, suffix: '', label: 'Years Experience', format: false },
        { target: 98, suffix: '%', label: 'Success Rate', format: false },
        { target: 3, suffix: '', label: 'Locations', format: false }
      ];

      return (
        <div ref={ref} className="bg-[#141414] border-y border-[#2A2A2A] py-10 md:py-14">
          <div className="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
            {stats.map((stat, i) => (
              <StatItem
                key={i}
                target={stat.target}
                suffix={stat.suffix}
                label={stat.label}
                format={stat.format}
                startCounting={isInView}
              />
            ))}
          </div>
        </div>
      );
    };

    const AboutSection = () => {
      const bullets = [
        'Science-backed training methodologies',
        'Holistic approach to fitness and nutrition',
        'Community-driven accountability system'
      ];

      return (
        <FadeInSection id="about" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <div className="grid md:grid-cols-2 gap-12 md:gap-16 items-center">
            <div>
              <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body mb-4 block">
                Our Philosophy
              </span>

              <h2 className="font-display text-4xl sm:text-5xl md:text-6xl leading-[0.95] text-[#F2F2F2] mb-8">
                WE DON'T JUST <br /> BUILD BODIES
              </h2>

              <p className="text-[#6B6B6B] font-body leading-relaxed mb-8 text-base sm:text-lg">
                We forge discipline, resilience, and unshakeable confidence. At FitPro, every session is designed
                to push your limits and redefine what you thought was possible.
              </p>

              <ul className="space-y-4">
                {bullets.map((text, i) => (
                  <li key={i} className="flex items-start gap-3 text-[#F2F2F2] font-body">
                    <span className="w-5 h-5 rounded-full bg-[#C8FF00]/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <polyline points="20,6 9,17 4,12" stroke="#C8FF00" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                    </span>
                    {text}
                  </li>
                ))}
              </ul>
            </div>

            <div className="placeholder-img rounded-lg h-[350px] sm:h-[450px] md:h-[500px] w-full border border-[#2A2A2A] flex items-center justify-center">
              <span className="text-[#6B6B6B] text-sm uppercase tracking-widest font-body">Your Photo Here</span>
            </div>
          </div>
        </FadeInSection>
      );
    };

    const ProgramsSection = () => {
      const programs = [
        {
          icon: '🏋️',
          title: 'Strength & Conditioning',
          desc: 'Build raw power and functional muscle with periodized programming.',
          duration: '12 Weeks',
          color: '#C8FF00'
        },
        {
          icon: '🔥',
          title: 'HIIT & Cardio',
          desc: 'Torch calories and boost endurance with high-intensity intervals.',
          duration: '8 Weeks',
          color: '#FF3B00'
        },
        {
          icon: '🎯',
          title: 'Personal Training',
          desc: 'One-on-one sessions tailored to your unique goals and biomechanics.',
          duration: 'Ongoing',
          color: '#C8FF00'
        },
        {
          icon: '🥗',
          title: 'Nutrition Coaching',
          desc: 'Custom meal plans and macro guidance to fuel your performance.',
          duration: '16 Weeks',
          color: '#FF3B00'
        }
      ];

      return (
        <FadeInSection id="programs" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body block text-center mb-4">
            Our Programs
          </span>

          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">
            Find Your Perfect Plan
          </h2>

          <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
            {programs.map((prog, i) => (
              <div key={i} className="program-card bg-[#141414] rounded-xl p-6 sm:p-8 flex flex-col gap-4 cursor-pointer group">
                <span className="text-3xl">{prog.icon}</span>
                <h3 className="font-display text-2xl text-[#F2F2F2] tracking-wide">{prog.title}</h3>
                <p className="text-[#6B6B6B] font-body text-sm leading-relaxed flex-grow">{prog.desc}</p>
                <span
                  className="inline-block px-3 py-1.5 rounded-full text-xs font-body uppercase tracking-wider border"
                  style={{ borderColor: prog.color, color: prog.color }}
                >
                  {prog.duration}
                </span>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    const CoachesSection = () => {
      const coaches = [
        { name: 'Marcus Stone', specialty: 'Strength & Powerlifting', initials: 'MS' },
        { name: 'Elena Voss', specialty: 'HIIT & Functional Fitness', initials: 'EV' },
        { name: 'David Kim', specialty: 'Nutrition & Body Recomp', initials: 'DK' }
      ];

      return (
        <FadeInSection id="coaches" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body block text-center mb-4">
            Our Team
          </span>

          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">
            Meet Your Coaches
          </h2>

          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {coaches.map((coach, i) => (
              <div key={i} className="coach-card bg-[#141414] rounded-xl overflow-hidden">
                <div className="placeholder-img h-72 sm:h-80 w-full flex items-center justify-center">
                  <span className="font-display text-6xl text-[#6B6B6B]/40 tracking-widest">{coach.initials}</span>
                </div>

                <div className="p-6 text-center">
                  <h3 className="font-display text-2xl text-[#F2F2F2] mb-1">{coach.name}</h3>
                  <p className="text-[#6B6B6B] font-body text-sm mb-4">{coach.specialty}</p>

                  <div className="flex justify-center gap-4">
                    {['twitter', 'instagram', 'linkedin'].map((social) => (
                      <span
                        key={social}
                        className="w-9 h-9 rounded-full bg-[#1a1a1a] border border-[#2A2A2A] flex items-center justify-center cursor-pointer hover:border-[#C8FF00] hover:text-[#C8FF00] transition-all text-[#6B6B6B] text-xs uppercase font-body"
                      >
                        {social[0].toUpperCase()}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    const TestimonialsSection = () => {
      const testimonials = [
        {
          quote: 'I lost 15kg in 3 months and gained confidence I never knew I had. The coaches genuinely care.',
          name: 'Sarah Mitchell',
          result: 'Lost 15kg in 3 months',
          initials: 'SM'
        },
        {
          quote: 'The personalized programming took my deadlift from 140kg to 200kg. Life-changing results.',
          name: 'James Rodriguez',
          result: 'Added 60kg to deadlift',
          initials: 'JR'
        },
        {
          quote: 'Finally found a gym that feels like family. The nutrition coaching transformed my relationship with food.',
          name: 'Priya Kapoor',
          result: 'Complete body recomposition',
          initials: 'PK'
        }
      ];

      return (
        <FadeInSection id="testimonials" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body block text-center mb-4">
            Testimonials
          </span>

          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">
            Real People, Real Results
          </h2>

          <div className="testimonials-scroll grid md:grid-cols-3 gap-6">
            {testimonials.map((t, i) => (
              <div key={i} className="bg-[#141414] border border-[#2A2A2A] rounded-xl p-6 sm:p-8 flex flex-col gap-5">
                <div className="flex gap-1">
                  {[1, 2, 3, 4, 5].map((star) => (
                    <span key={star} className="text-[#C8FF00]">★</span>
                  ))}
                </div>

                <p className="text-[#F2F2F2] font-body text-base leading-relaxed italic flex-grow">
                  “{t.quote}”
                </p>

                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-full placeholder-img flex items-center justify-center flex-shrink-0 border border-[#2A2A2A]">
                    <span className="font-display text-lg text-[#6B6B6B]">{t.initials}</span>
                  </div>

                  <div>
                    <p className="font-body font-semibold text-[#F2F2F2] text-sm">{t.name}</p>
                    <p className="text-[#C8FF00] text-xs font-body uppercase tracking-wider">{t.result}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    const PricingSection = () => {
      const plans = [
        {
          name: 'Starter',
          price: 49,
          features: ['3 sessions/month', 'Basic nutrition guide', 'Group class access', 'Email support'],
          featured: false
        },
        {
          name: 'Pro',
          price: 99,
          features: ['12 sessions/month', 'Custom meal plan', '1-on-1 coaching', 'Priority booking', 'Body composition scans'],
          featured: true
        },
        {
          name: 'Elite',
          price: 199,
          features: ['Unlimited sessions', 'Personalized programming', '24/7 coach access', 'Monthly progress reviews', 'Supplement guidance', 'Exclusive workshops'],
          featured: false
        }
      ];

      return (
        <FadeInSection id="pricing" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body block text-center mb-4">
            Pricing
          </span>

          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">
            Invest in Yourself
          </h2>

          <div className="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
            {plans.map((plan, i) => (
              <div
                key={i}
                className={`pricing-card bg-[#141414] rounded-xl p-8 flex flex-col ${plan.featured ? 'featured ring-1 ring-[#C8FF00]/40' : ''}`}
              >
                {plan.featured && (
                  <span className="absolute -top-3.5 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-[#C8FF00] text-[#0a0a0a] text-xs font-body font-bold uppercase tracking-wider rounded-full">
                    Most Popular
                  </span>
                )}

                <h3 className="font-display text-3xl text-[#F2F2F2] mb-2">{plan.name}</h3>

                <div className="flex items-baseline gap-1 mb-6">
                  <span className="text-[#6B6B6B] text-lg font-body">$</span>
                  <span className="font-display text-5xl text-[#F2F2F2]">{plan.price}</span>
                  <span className="text-[#6B6B6B] font-body">/mo</span>
                </div>

                <ul className="space-y-3 mb-8 flex-grow">
                  {plan.features.map((feat, j) => (
                    <li key={j} className="flex items-center gap-2 text-[#6B6B6B] font-body text-sm">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <polyline points="20,6 9,17 4,12" stroke="#C8FF00" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                      {feat}
                    </li>
                  ))}
                </ul>

                <button
                  className={`w-full py-3.5 rounded font-body font-semibold text-sm uppercase tracking-wider cursor-pointer transition-all duration-200 ${
                    plan.featured
                      ? 'bg-[#C8FF00] text-[#0a0a0a] border-none hover:bg-[#b8e600] hover:shadow-lg hover:shadow-[#C8FF00]/30'
                      : 'bg-transparent border-2 border-[#F2F2F2]/20 text-[#F2F2F2] hover:border-[#C8FF00] hover:text-[#C8FF00]'
                  }`}
                >
                  Choose {plan.name}
                </button>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    const CTABanner = () => {
      return (
        <FadeInSection className="py-20 md:py-24">
          <div className="bg-[#C8FF00] cta-pattern relative overflow-hidden">
            <div className="max-w-4xl mx-auto text-center px-4 py-16 md:py-20 relative z-10">
              <h2 className="font-display text-4xl sm:text-5xl md:text-7xl text-[#0a0a0a] leading-[0.9] mb-6">
                READY TO CHANGE <br /> EVERYTHING?
              </h2>

              <p className="text-[#0a0a0a]/70 font-body text-lg mb-10 max-w-xl mx-auto">
                Your transformation starts with a single decision. Take the first step today.
              </p>

              <button
                onClick={() => scrollToSection('contact')}
                className="px-10 py-4 bg-[#0a0a0a] text-[#C8FF00] font-body font-bold text-base uppercase tracking-wider rounded cursor-pointer border-none hover:bg-[#1a1a1a] transition-all duration-200 hover:shadow-2xl hover:-translate-y-0.5"
              >
                Get Started Now
              </button>
            </div>
          </div>
        </FadeInSection>
      );
    };

    const ContactSection = () => {
      const [formData, setFormData] = useState({ name: '', email: '', message: '' });
      const [submitted, setSubmitted] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);

        setTimeout(() => {
          setSubmitted(false);
          setFormData({ name: '', email: '', message: '' });
        }, 3000);
      };

      const handleChange = (e) => {
        setFormData((prev) => ({ ...prev, [e.target.name]: e.target.value }));
      };

      return (
        <FadeInSection id="contact" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <div className="grid md:grid-cols-2 gap-12 md:gap-16">
            <div>
              <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body block mb-4">
                Get in Touch
              </span>

              <h2 className="font-display text-4xl sm:text-5xl text-[#F2F2F2] mb-8">
                Let's Talk
              </h2>

              <form onSubmit={handleSubmit} className="space-y-5">
                <div>
                  <label htmlFor="name" className="block text-xs uppercase tracking-widest text-[#6B6B6B] mb-2 font-body">
                    Name
                  </label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    value={formData.name}
                    onChange={handleChange}
                    required
                    className="w-full bg-[#141414] border border-[#2A2A2A] rounded-lg px-4 py-3 text-[#F2F2F2] font-body focus:border-[#C8FF00] focus:outline-none transition-colors placeholder:text-[#6B6B6B]"
                    placeholder="Your name"
                  />
                </div>

                <div>
                  <label htmlFor="email" className="block text-xs uppercase tracking-widest text-[#6B6B6B] mb-2 font-body">
                    Email
                  </label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    value={formData.email}
                    onChange={handleChange}
                    required
                    className="w-full bg-[#141414] border border-[#2A2A2A] rounded-lg px-4 py-3 text-[#F2F2F2] font-body focus:border-[#C8FF00] focus:outline-none transition-colors placeholder:text-[#6B6B6B]"
                    placeholder="you@email.com"
                  />
                </div>

                <div>
                  <label htmlFor="message" className="block text-xs uppercase tracking-widest text-[#6B6B6B] mb-2 font-body">
                    Message
                  </label>
                  <textarea
                    id="message"
                    name="message"
                    value={formData.message}
                    onChange={handleChange}
                    required
                    rows="4"
                    className="w-full bg-[#141414] border border-[#2A2A2A] rounded-lg px-4 py-3 text-[#F2F2F2] font-body focus:border-[#C8FF00] focus:outline-none transition-colors resize-none placeholder:text-[#6B6B6B]"
                    placeholder="Tell us about your goals..."
                  ></textarea>
                </div>

                <button
                  type="submit"
                  className="w-full py-3.5 bg-[#FF3B00] text-white font-body font-semibold text-sm uppercase tracking-wider rounded-lg cursor-pointer border-none hover:bg-[#e63500] transition-all duration-200 hover:shadow-lg hover:shadow-[#FF3B00]/25 disabled:opacity-50 disabled:cursor-not-allowed"
                  disabled={submitted}
                >
                  {submitted ? 'Message Sent! ✅' : 'Send Message'}
                </button>
              </form>
            </div>

            <div className="flex flex-col justify-center gap-8">
              <div>
                <p className="text-xs uppercase tracking-widest text-[#6B6B6B] mb-1 font-body">Location</p>
                <p className="text-[#F2F2F2] font-body text-lg">123 Fitness Avenue <br /> New York, NY 10001</p>
              </div>

              <div>
                <p className="text-xs uppercase tracking-widest text-[#6B6B6B] mb-1 font-body">Phone</p>
                <p className="text-[#F2F2F2] font-body text-lg">(555) 123-4567</p>
              </div>

              <div>
                <p className="text-xs uppercase tracking-widest text-[#6B6B6B] mb-1 font-body">Email</p>
                <p className="text-[#F2F2F2] font-body text-lg">hello@fitpro.co</p>
              </div>

              <div className="flex gap-4 mt-4 flex-wrap">
                {['Twitter', 'Instagram', 'YouTube', 'LinkedIn'].map((s) => (
                  <span
                    key={s}
                    className="text-sm text-[#6B6B6B] hover:text-[#C8FF00] cursor-pointer transition-colors font-body uppercase tracking-wider"
                  >
                    {s}
                  </span>
                ))}
              </div>
            </div>
          </div>

          <div className="mt-16 pt-8 border-t border-[#2A2A2A] flex flex-col sm:flex-row justify-between items-center gap-4">
            <p className="text-[#6B6B6B] text-sm font-body">© 2026 FitPro. All rights reserved.</p>

            <div className="flex gap-6">
              <span className="text-xs text-[#6B6B6B] hover:text-[#F2F2F2] cursor-pointer transition-colors font-body">Privacy Policy</span>
              <span className="text-xs text-[#6B6B6B] hover:text-[#F2F2F2] cursor-pointer transition-colors font-body">Terms of Service</span>
            </div>
          </div>
        </FadeInSection>
      );
    };

    const FitProApp = () => {
      useEffect(() => {
        const hash = window.location.hash.replace('#', '');

        if (hash) {
          setTimeout(() => scrollToSection(hash), 300);
        }
      }, []);

      return (
        <div className="min-h-screen bg-[#0a0a0a] font-body">
          <Navbar />
          <HeroSection />
          <StatsBar />
          <AboutSection />
          <ProgramsSection />
          <CoachesSection />
          <TestimonialsSection />
          <PricingSection />
          <CTABanner />
          <ContactSection />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FitProApp />);

    console.log('%c🏋️ FitPro Ready — fixed version', 'font-size: 18px; color: #C8FF00; font-weight: bold;');
  </script>
</body>
</html>
