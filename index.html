<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPro — Premium Fitness & Personal Training</title>

    <!-- Google Fonts: Bebas Neue + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['"Bebas Neue"', 'sans-serif'],
                        'body': ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        'bg': '#0a0a0a',
                        'surface': '#141414',
                        'accent': '#C8FF00',
                        'accent-secondary': '#FF3B00',
                        'text': '#F2F2F2',
                        'muted': '#6B6B6B',
                        'border': '#2A2A2A',
                    }
                }
            }
        }

    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --accent: #C8FF00;
            --accent-secondary: #FF3B00;
            --text: #F2F2F2;
            --muted: #6B6B6B;
            --border: #2A2A2A;
        }

        * {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Noise texture overlay */
        .noise-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.035;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        /* Fade-in animation for scroll */
        .fade-in-section {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .fade-in-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Stagger children */
        .stagger-children>* {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .stagger-children.is-visible>*:nth-child(1) {
            transition-delay: 0.05s;
            opacity: 1;
            transform: translateY(0);
        }
        .stagger-children.is-visible>*:nth-child(2) {
            transition-delay: 0.15s;
            opacity: 1;
            transform: translateY(0);
        }
        .stagger-children.is-visible>*:nth-child(3) {
            transition-delay: 0.25s;
            opacity: 1;
            transform: translateY(0);
        }
        .stagger-children.is-visible>*:nth-child(4) {
            transition-delay: 0.35s;
            opacity: 1;
            transform: translateY(0);
        }
        .stagger-children.is-visible>*:nth-child(5) {
            transition-delay: 0.45s;
            opacity: 1;
            transform: translateY(0);
        }
        .stagger-children.is-visible>*:nth-child(6) {
            transition-delay: 0.55s;
            opacity: 1;
            transform: translateY(0);
        }

        /* Program card glow */
        .program-card {
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid var(--border);
        }
        .program-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(200, 255, 0, 0.1), 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Coach card */
        .coach-card {
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid var(--border);
        }
        .coach-card:hover {
            transform: scale(1.03);
            border-color: rgba(200, 255, 0, 0.3);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
        }

        /* Pricing card */
        .pricing-card {
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid var(--border);
        }
        .pricing-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .pricing-card.featured {
            border: 2px solid var(--accent);
            position: relative;
        }

        /* Mobile menu */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .mobile-menu.open {
            transform: translateX(0);
        }

        /* Animated scroll indicator */
        @keyframes bounceDown {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(12px);
            }
        }
        .scroll-indicator {
            animation: bounceDown 1.8s ease-in-out infinite;
        }

        /* CTA banner pattern */
        .cta-pattern {
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Focus states */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Placeholder gradient images */
        .placeholder-img {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 30%, #1a1a1a 60%, #0d0d0d 100%);
            position: relative;
            overflow: hidden;
        }
        .placeholder-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(200, 255, 0, 0.03) 50%, transparent 100%);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* Testimonial horizontal scroll on mobile */
        @media (max-width: 768px) {
            .testimonials-scroll {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 16px;
                padding-bottom: 16px;
                -webkit-overflow-scrolling: touch;
            }
            .testimonials-scroll>* {
                flex: 0 0 85vw;
                scroll-snap-align: start;
            }
            .testimonials-scroll::-webkit-scrollbar {
                height: 4px;
            }
        }

</head>
<body>
    <div id="root"></div>

    <!-- React + ReactDOM + Framer Motion + React Router CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js">
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { motion, AnimatePresence } = window.framerMotion || {};
        const {
            BrowserRouter,
            Routes,
            Route,
            useLocation,
            useNavigate,
            Link,
            NavLink
        } = window.ReactRouterDOM || {};

        // Fallback for Framer Motion if not loaded
        const MotionDiv = motion?.div || 'div';
        const MotionSpan = motion?.span || 'span';
        const MotionButton = motion?.button || 'button';
        const AnimatePresenceComp = AnimatePresence || React.Fragment;

        /* ============================================================
           CUSTOM HOOK: IntersectionObserver for scroll animations
           ============================================================ */
        const useInView = (options = {}) => {
            const ref = useRef(null);
            const [isInView, setIsInView] = useState(false);

            useEffect(() => {
                const element = ref.current;
                if (!element) return;

                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsInView(true);
                            // Optionally unobserve after first reveal
                            if (options.once !== false) {
                                observer.unobserve(element);
                            }
                        } else if (options.once === false) {
                            setIsInView(false);
                        }
                    }, {
                        threshold: options.threshold || 0.15,
                        rootMargin: options.rootMargin || '0px 0px -50px 0px',
                    }
                );

                observer.observe(element);
                return () => observer.disconnect();
            }, [options.threshold, options.rootMargin, options.once]);

            return [ref, isInView];
        };

        /* ============================================================
           CUSTOM HOOK: Animated Counter
           ============================================================ */
        const useCountUp = (target, duration = 2000, startCounting = false) => {
            const [count, setCount] = useState(0);
            const rafRef = useRef(null);
            const startTimeRef = useRef(null);

            useEffect(() => {
                if (!startCounting) {
                    setCount(0);
                    return;
                }

                const animate = (timestamp) => {
                    if (!startTimeRef.current) startTimeRef.current = timestamp;
                    const elapsed = timestamp - startTimeRef.current;
                    const progress = Math.min(elapsed / duration, 1);
                    // Ease out cubic
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setCount(Math.floor(eased * target));

                    if (progress < 1) {
                        rafRef.current = requestAnimationFrame(animate);
                    } else {
                        setCount(target);
                    }
                };

                rafRef.current = requestAnimationFrame(animate);
                return () => {
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                    startTimeRef.current = null;
                };
            }, [target, duration, startCounting]);

            return count;
        };

        /* ============================================================
           REUSABLE: Section Wrapper with fade-in
           ============================================================ */
        const FadeInSection = ({ children, className = '', id = '', stagger = false }) => {
            const [ref, isInView] = useInView({ threshold: 0.1 });
            return ( <
                section id = { id }
                ref = { ref }
                className = { `fade-in-section ${stagger ? 'stagger-children' : ''} ${isInView ? 'is-visible' : ''} ${className}` } >
                { children } <
                /section>
            );
        };

        /* ============================================================
           COMPONENT: Navbar
           ============================================================ */
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                setMobileOpen(false);
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            const navLinks = [
                { label: 'About', id: 'about' },
                { label: 'Programs', id: 'programs' },
                { label: 'Coaches', id: 'coaches' },
                { label: 'Pricing', id: 'pricing' },
                { label: 'Contact', id: 'contact' },
            ];

            return ( <
                nav className = { `fixed top-0 left-0 w-full z-50 transition-all duration-400 ${scrolled ? 'bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-[#2A2A2A] py-3' : 'bg-transparent py-5'}` } >
                <
                div className = "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between" >
                { /* Logo */ } <
                button onClick = {
                    () => scrollTo('hero') }
                className = "flex items-center gap-1.5 group cursor-pointer bg-transparent border-none p-0" >
                <
                span className = "font-display text-3xl sm:text-4xl tracking-tight text-[#F2F2F2] group-hover:text-white transition-colors" >
                FIT PRO <
                /span> <
                span className = "w-2 h-2 rounded-full bg-[#C8FF00] inline-block ml-1 animate-pulse" >
                </span> <
                /button>

                { /* Desktop Links */ } <
                div className = "hidden md:flex items-center gap-8" > {
                    navLinks.map((link) => ( <
                        button key = { link.id }
                        onClick = {
                            () => scrollTo(link.id) }
                        className = "text-sm uppercase tracking-widest text-[#6B6B6B] hover:text-[#C8FF00] transition-colors duration-200 font-body cursor-pointer bg-transparent border-none" >
                        { link.label } <
                        /button>
                    ))
                } <
                button onClick = {
                    () => scrollTo('pricing') }
                className = "ml-4 px-6 py-2.5 bg-[#FF3B00] text-white font-body font-semibold text-sm uppercase tracking-wider rounded hover:bg-[#e63500] transition-all duration-200 hover:shadow-lg hover:shadow-[#FF3B00]/25 cursor-pointer border-none" >
                Get Started <
                /button> <
                /div>

                { /* Mobile Hamburger */ } <
                button onClick = {
                    () => setMobileOpen(!mobileOpen) }
                className = "md:hidden flex flex-col gap-1.5 p-2 cursor-pointer bg-transparent border-none z-50 relative"
                aria-label = "Toggle menu" >
                <
                span className = { `block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? 'rotate-45 translate-y-2' : ''}` } > </span> <
                span className = { `block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? 'opacity-0' : ''}` } > </span> <
                span className = { `block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? '-rotate-45 -translate-y-2' : ''}` } > </span> <
                /button> <
                /div>

                { /* Mobile Menu Overlay */ } <
                div className = { `fixed inset-0 bg-[#0a0a0a]/98 backdrop-blur-xl z-40 flex flex-col items-center justify-center gap-8 transition-all duration-400 md:hidden ${mobileOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}` } >
                {
                    navLinks.map((link, i) => ( <
                        button key = { link.id }
                        onClick = {
                            () => scrollTo(link.id) }
                        className = "text-2xl uppercase tracking-widest text-[#F2F2F2] hover:text-[#C8FF00] transition-colors font-display cursor-pointer bg-transparent border-none"
                        style = { { transitionDelay: mobileOpen ? `${i * 0.08}s` : '0s' } } >
                        { link.label } <
                        /button>
                    ))
                } <
                button onClick = {
                    () => scrollTo('pricing') }
                className = "mt-4 px-8 py-3 bg-[#FF3B00] text-white font-body font-semibold text-lg uppercase tracking-wider rounded cursor-pointer border-none hover:bg-[#e63500] transition-colors" >
                Get Started <
                /button> <
                /div> <
                /nav>
            );
        };

        /* ============================================================
           COMPONENT: Hero Section
           ============================================================ */
        const HeroSection = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const heroRef = useRef(null);
            const [, isInView] = useInView({ threshold: 0.1 });

            const handleMouseMove = useCallback((e) => {
                if (!heroRef.current) return;
                const rect = heroRef.current.getBoundingClientRect();
                setMousePos({
                    x: (e.clientX - rect.left) / rect.width - 0.5,
                    y: (e.clientY - rect.top) / rect.height - 0.5,
                });
            }, []);

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return ( <
                section id = "hero"
                ref = { heroRef }
                onMouseMove = { handleMouseMove }
                className = "relative min-h-screen flex items-center justify-center overflow-hidden bg-[#0a0a0a]" >
                { /* Noise overlay */ } <
                div className = "noise-overlay" > </div>

                { /* Gradient orbs */ } <
                div className = "absolute inset-0 overflow-hidden pointer-events-none" >
                <
                div className = "absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full opacity-[0.07]"
                style = { {
                    background: 'radial-gradient(circle, #C8FF00 0%, transparent 70%)',
                        transform: `translate(${mousePos.x * 30}px, ${mousePos.y * 30}px)`,
                        transition: 'transform 0.3s ease-out',
                    }
                } >
                </div> <
                div className = "absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full opacity-[0.05]"
                style = { {
                    background: 'radial-gradient(circle, #FF3B00 0%, transparent 70%)',
                        transform: `translate(${mousePos.x * -20}px, ${mousePos.y * -20}px)`,
                        transition: 'transform 0.3s ease-out',
                    }
                } >
                </div> <
                /div>

                { /* Content */ } <
                div className = "relative z-10 text-center px-4 max-w-5xl mx-auto" >
                <
                h1 className = "font-display text-6xl sm:text-7xl md:text-8xl lg:text-9xl leading-[0.85] tracking-tight text-[#F2F2F2] mb-6" >
                TRAIN LIKE < br / >
                < span className = "text-[#C8FF00]" > IT MATTERS < /span> <
                /h1> <
                p className = "text-lg sm:text-xl md:text-2xl text-[#6B6B6B] font-body max-w-2xl mx-auto mb-10 leading-relaxed" >
                Results - driven coaching
                for serious athletes and ambitious beginners. <
                /p>

                { /* CTAs */ } <
                div className = "flex flex-col sm:flex-row gap-4 justify-center items-center" >
                <
                button onClick = {
                    () => scrollTo('pricing') }
                className = "px-8 py-4 bg-[#FF3B00] text-white font-body font-semibold text-base uppercase tracking-wider rounded cursor-pointer border-none hover:bg-[#e63500] transition-all duration-200 hover:shadow-xl hover:shadow-[#FF3B00]/30 hover:-translate-y-0.5" >
                Start Your Journey <
                /button> <
                button className = "px-8 py-4 bg-transparent border-2 border-[#F2F2F2]/30 text-[#F2F2F2] font-body font-semibold text-base uppercase tracking-wider rounded cursor-pointer hover:border-[#C8FF00] hover:text-[#C8FF00] transition-all duration-200 flex items-center gap-2" >
                <
                svg width = "16"
                height = "16"
                viewBox = "0 0 24 24"
                fill = "currentColor" >
                <
                polygon points = "5,3 19,12 5,21" / >
                <
                /svg>
                Watch Story <
                /button> <
                /div>

                { /* Floating badge */ } <
                div className = "inline-flex items-center gap-2 mt-12 px-5 py-3 bg-[#141414] border border-[#2A2A2A] rounded-full text-sm font-body" >
                <
                span className = "w-2.5 h-2.5 rounded-full bg-[#C8FF00] animate-pulse" > </span> <
                span className = "text-[#6B6B6B]" > < span className = "text-[#C8FF00] font-semibold" > 500 + < /span> Members Transformed</span >
                <
                /div> <
                /div>

                { /* Scroll indicator */ } <
                div className = "absolute bottom-8 left-1/2 -translate-x-1/2 z-10 scroll-indicator" >
                <
                svg width = "28"
                height = "28"
                viewBox = "0 0 24 24"
                fill = "none"
                stroke = "#6B6B6B"
                strokeWidth = "2"
                strokeLinecap = "round" >
                <
                polyline points = "6,9 12,15 18,9" / >
                <
                /svg> <
                /div> <
                /section>
            );
        };

        /* ============================================================
           COMPONENT: Stats Bar
           ============================================================ */
        const StatsBar = () => {
            const [ref, isInView] = useInView({ threshold: 0.3 });

            const stats = [
                { target: 500, suffix: '+', label: 'Members', format: true },
                { target: 12, suffix: '', label: 'Years Experience', format: false },
                { target: 98, suffix: '%', label: 'Success Rate', format: false },
                { target: 3, suffix: '', label: 'Locations', format: false },
            ];

            return ( <
                div ref = { ref }
                className = "bg-[#141414] border-y border-[#2A2A2A] py-10 md:py-14" >
                <
                div className = "max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-8 text-center" > {
                    stats.map((stat, i) => ( <
                        StatItem key = { i }
                        target = { stat.target }
                        suffix = { stat.suffix }
                        label = { stat.label }
                        format = { stat.format }
                        startCounting = { isInView }
                        />
                    ))
                } <
                /div> <
                /div>
            );
        };

        const StatItem = ({ target, suffix, label, format, startCounting }) => {
            const count = useCountUp(target, 2000, startCounting);
            const display = format ? count.toLocaleString() : count;
            return ( <
                div className = "flex flex-col items-center gap-2" >
                <
                span className = "font-display text-4xl sm:text-5xl md:text-6xl text-[#C8FF00] tracking-tight" >
                { display } { suffix } <
                /span> <
                span className = "text-sm uppercase tracking-widest text-[#6B6B6B] font-body" > { label } < /span> <
                /div>
            );
        };

        /* ============================================================
           COMPONENT: About / Philosophy
           ============================================================ */
        const AboutSection = () => {
            const [ref, isInView] = useInView({ threshold: 0.15 });
            const bullets = [
                'Science-backed training methodologies',
                'Holistic approach to fitness and nutrition',
                'Community-driven accountability system',
            ];

            return ( <
                FadeInSection id = "about"
                className = "py-20 md:py-28 px-4 max-w-7xl mx-auto" >
                <
                div className = "grid md:grid-cols-2 gap-12 md:gap-16 items-center" >
                { /* Left: Text */ } <
                div >
                <
                span className = "text-xs uppercase tracking-[0.2em] text-[#C8FF00] font-body mb-4 block" >
                Our Philosophy <
                /span> <
                h2 className = "font-display text-4xl sm:text-5xl md:text-6xl leading-[0.95] text-[#F2F2F2] mb-8" >
                WE DON 'T JUST <br /> BUILD BODIES
                </h2> <
                p className = "text-[#6B6B6B] font-body leading-relaxed mb-8 text-base sm:text-lg" >
                We forge discipline, resilience, and unshakeable confidence.At FitPro,
                    every session is designed to push your limits and redefine what you thought was possible. <
                /p> <
                ul className = "space-y-4" > {
                    bullets.map((text, i) => ( <
                        li key = { i }
                        className = "flex items-start gap-3 text-[#F2F2F2] font-body" >
                        <
                        span className = "w-5 h-5 rounded-full bg-[#C8FF00]/20 flex items-center justify-center flex-shrink-0 mt-0.5" >
                        <
                        svg width = "12"
                        height = "12"
                        viewBox = "0 0 24 24"
                        fill = "#C8FF00" >
                        <
                        polyline points = "20,6 9,17 4,12"
                        stroke = "#C8FF00"
