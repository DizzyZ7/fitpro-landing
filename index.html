<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitPro — Premium Fitness & Personal Training</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            bg: '#0a0a0a',
            surface: '#141414',
            accent: '#C8FF00',
            'accent-secondary': '#FF3B00',
            text: '#F2F2F2',
            muted: '#6B6B6B',
            border: '#2A2A2A',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --accent: #C8FF00;
      --accent-secondary: #FF3B00;
      --text: #F2F2F2;
      --muted: #6B6B6B;
      --border: #2A2A2A;
    }
    * { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .noise-overlay {
      position: absolute; inset: 0; opacity: 0.035; pointer-events: none; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 200px 200px;
    }
    .fade-in-section { opacity: 0; transform: translateY(40px); transition: opacity 0.7s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
    .fade-in-section.is-visible { opacity: 1; transform: translateY(0); }
    .stagger-children > * { opacity: 0; transform: translateY(30px); transition: opacity 0.6s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .stagger-children.is-visible > *:nth-child(1) { transition-delay: 0.05s; opacity: 1; transform: translateY(0); }
    .stagger-children.is-visible > *:nth-child(2) { transition-delay: 0.15s; opacity: 1; transform: translateY(0); }
    .stagger-children.is-visible > *:nth-child(3) { transition-delay: 0.25s; opacity: 1; transform: translateY(0); }
    .stagger-children.is-visible > *:nth-child(4) { transition-delay: 0.35s; opacity: 1; transform: translateY(0); }
    .stagger-children.is-visible > *:nth-child(5) { transition-delay: 0.45s; opacity: 1; transform: translateY(0); }
    .stagger-children.is-visible > *:nth-child(6) { transition-delay: 0.55s; opacity: 1; transform: translateY(0); }
    .program-card { transition: all 0.4s ease; border: 1px solid var(--border); }
    .program-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 0 40px rgba(200,255,0,0.1), 0 20px 40px rgba(0,0,0,0.4); }
    .coach-card { transition: all 0.4s ease; border: 1px solid var(--border); }
    .coach-card:hover { transform: scale(1.03); border-color: rgba(200,255,0,0.3); box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
    .pricing-card { transition: all 0.4s ease; border: 1px solid var(--border); }
    .pricing-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .pricing-card.featured { border: 2px solid var(--accent); }
    .mobile-menu { transform: translateX(100%); transition: transform 0.4s ease; }
    .mobile-menu.open { transform: translateX(0); }
    @keyframes bounceDown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(12px); } }
    .scroll-indicator { animation: bounceDown 1.8s ease-in-out infinite; }
    .cta-pattern { background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1px, transparent 1px); background-size: 24px 24px; }
    .placeholder-img { background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 30%, #1a1a1a 60%, #0d0d0d 100%); position: relative; overflow: hidden; }
    .placeholder-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(200,255,0,0.03) 50%, transparent 100%); animation: shimmer 3s ease-in-out infinite; }
    @keyframes shimmer { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    @media (max-width: 768px) { .testimonials-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding-bottom: 16px; -webkit-overflow-scrolling: touch; } .testimonials-scroll > * { flex: 0 0 85vw; scroll-snap-align: start; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM + Babel + React Router -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.production.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { BrowserRouter, Routes, Route } = window.ReactRouterDOM;

    /* ---------- Intersection Observer Hook ---------- */
    const useInView = (options = {}) => {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { setIsInView(true); if (options.once !== false) observer.unobserve(el); }
          else if (options.once === false) setIsInView(false);
        }, { threshold: options.threshold || 0.1 });
        observer.observe(el);
        return () => observer.disconnect();
      }, []);
      return [ref, isInView];
    };

    /* ---------- Animated Counter Hook ---------- */
    const useCountUp = (target, startCounting) => {
      const [count, setCount] = useState(0);
      useEffect(() => {
        if (!startCounting) return;
        let startTime, raf;
        const animate = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / 2000, 1);
          setCount(Math.floor(progress * target));
          if (progress < 1) raf = requestAnimationFrame(animate);
          else setCount(target);
        };
        raf = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(raf);
      }, [target, startCounting]);
      return count;
    };

    /* ---------- FadeIn Section Wrapper ---------- */
    const FadeInSection = ({ children, className = '', id, stagger }) => {
      const [ref, isInView] = useInView();
      return (
        <section ref={ref} id={id} className={`fade-in-section ${className} ${isInView ? 'is-visible' : ''} ${stagger ? 'stagger-children' : ''}`}>
          {children}
        </section>
      );
    };

    /* ---------- NAVBAR ---------- */
    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      const scrollTo = (id) => { setMobileOpen(false); document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); };
      const links = ['about','programs','coaches','pricing','contact'];
      return (
        <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-400 ${scrolled ? 'bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-[#2A2A2A] py-3' : 'bg-transparent py-5'}`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <button onClick={() => scrollTo('hero')} className="flex items-center gap-1.5 cursor-pointer bg-transparent border-none p-0">
              <span className="font-display text-3xl sm:text-4xl text-[#F2F2F2]">FIT PRO</span>
              <span className="w-2 h-2 rounded-full bg-[#C8FF00] inline-block animate-pulse"></span>
            </button>
            <div className="hidden md:flex items-center gap-8">
              {links.map(id => <button key={id} onClick={() => scrollTo(id)} className="text-sm uppercase tracking-widest text-[#6B6B6B] hover:text-[#C8FF00] transition-colors bg-transparent border-none cursor-pointer">{id}</button>)}
              <button onClick={() => scrollTo('pricing')} className="ml-4 px-6 py-2.5 bg-[#FF3B00] text-white font-semibold text-sm uppercase tracking-wider rounded hover:bg-[#e63500] transition-all border-none cursor-pointer">Get Started</button>
            </div>
            <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden flex flex-col gap-1.5 p-2 bg-transparent border-none cursor-pointer z-50 relative">
              <span className={`block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
              <span className={`block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? 'opacity-0' : ''}`}></span>
              <span className={`block w-6 h-0.5 bg-[#F2F2F2] transition-all duration-300 ${mobileOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
            </button>
          </div>
          <div className={`fixed inset-0 bg-[#0a0a0a]/95 backdrop-blur-xl z-40 flex flex-col items-center justify-center gap-8 transition-all duration-400 md:hidden ${mobileOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
            {links.map(id => <button key={id} onClick={() => scrollTo(id)} className="text-2xl uppercase tracking-widest text-[#F2F2F2] hover:text-[#C8FF00] transition-colors font-display bg-transparent border-none cursor-pointer">{id}</button>)}
            <button onClick={() => scrollTo('pricing')} className="mt-4 px-8 py-3 bg-[#FF3B00] text-white font-semibold text-lg uppercase tracking-wider rounded border-none cursor-pointer">Get Started</button>
          </div>
        </nav>
      );
    };

    /* ---------- HERO ---------- */
    const HeroSection = () => {
      const [mousePos, setMousePos] = useState({ x:0, y:0 });
      const heroRef = useRef(null);
      const handleMouseMove = (e) => {
        if (!heroRef.current) return;
        const rect = heroRef.current.getBoundingClientRect();
        setMousePos({ x: (e.clientX - rect.left)/rect.width - 0.5, y: (e.clientY - rect.top)/rect.height - 0.5 });
      };
      const scrollTo = (id) => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
      return (
        <section id="hero" ref={heroRef} onMouseMove={handleMouseMove} className="relative min-h-screen flex items-center justify-center overflow-hidden bg-[#0a0a0a]">
          <div className="noise-overlay"></div>
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <div className="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full opacity-[0.07]" style={{ background: 'radial-gradient(circle, #C8FF00 0%, transparent 70%)', transform: `translate(${mousePos.x*30}px, ${mousePos.y*30}px)` }}></div>
            <div className="absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full opacity-[0.05]" style={{ background: 'radial-gradient(circle, #FF3B00 0%, transparent 70%)', transform: `translate(${mousePos.x*-20}px, ${mousePos.y*-20}px)` }}></div>
          </div>
          <div className="relative z-10 text-center px-4 max-w-5xl mx-auto">
            <h1 className="font-display text-6xl sm:text-7xl md:text-8xl lg:text-9xl leading-[0.85] text-[#F2F2F2] mb-6">TRAIN LIKE<br/><span className="text-[#C8FF00]">IT MATTERS</span></h1>
            <p className="text-lg sm:text-xl md:text-2xl text-[#6B6B6B] max-w-2xl mx-auto mb-10">Results-driven coaching for serious athletes and ambitious beginners.</p>
            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
              <button onClick={() => scrollTo('pricing')} className="px-8 py-4 bg-[#FF3B00] text-white font-semibold text-base uppercase tracking-wider rounded border-none cursor-pointer hover:bg-[#e63500] transition-all">Start Your Journey</button>
              <button className="px-8 py-4 bg-transparent border-2 border-[#F2F2F2]/30 text-[#F2F2F2] font-semibold text-base uppercase tracking-wider rounded cursor-pointer hover:border-[#C8FF00] hover:text-[#C8FF00] transition-all flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Watch Story
              </button>
            </div>
            <div className="inline-flex items-center gap-2 mt-12 px-5 py-3 bg-[#141414] border border-[#2A2A2A] rounded-full text-sm">
              <span className="w-2.5 h-2.5 rounded-full bg-[#C8FF00] animate-pulse"></span> <span className="text-[#6B6B6B]"><span className="text-[#C8FF00] font-semibold">500+</span> Members Transformed</span>
            </div>
          </div>
          <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 scroll-indicator">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6B6B6B" strokeWidth="2"><polyline points="6,9 12,15 18,9"/></svg>
          </div>
        </section>
      );
    };

    /* ---------- STATS BAR ---------- */
    const StatsBar = () => {
      const [ref, isInView] = useInView({ threshold: 0.3 });
      const members = useCountUp(500, isInView);
      const years = useCountUp(12, isInView);
      const success = useCountUp(98, isInView);
      const locations = useCountUp(3, isInView);
      return (
        <div ref={ref} className="bg-[#141414] border-y border-[#2A2A2A] py-10 md:py-14">
          <div className="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
            <div><span className="font-display text-4xl sm:text-5xl md:text-6xl text-[#C8FF00]">{members.toLocaleString()}+</span><span className="block text-xs uppercase tracking-widest text-[#6B6B6B] mt-2">Members</span></div>
            <div><span className="font-display text-4xl sm:text-5xl md:text-6xl text-[#C8FF00]">{years}</span><span className="block text-xs uppercase tracking-widest text-[#6B6B6B] mt-2">Years Experience</span></div>
            <div><span className="font-display text-4xl sm:text-5xl md:text-6xl text-[#C8FF00]">{success}%</span><span className="block text-xs uppercase tracking-widest text-[#6B6B6B] mt-2">Success Rate</span></div>
            <div><span className="font-display text-4xl sm:text-5xl md:text-6xl text-[#C8FF00]">{locations}</span><span className="block text-xs uppercase tracking-widest text-[#6B6B6B] mt-2">Locations</span></div>
          </div>
        </div>
      );
    };

    /* ---------- ABOUT ---------- */
    const AboutSection = () => (
      <FadeInSection id="about" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
        <div className="grid md:grid-cols-2 gap-12 items-center">
          <div>
            <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] block mb-4">Our Philosophy</span>
            <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-[#F2F2F2] mb-8">WE DON'T JUST<br/>BUILD BODIES</h2>
            <p className="text-[#6B6B6B] leading-relaxed mb-8">We forge discipline, resilience, and unshakeable confidence. At FitPro, every session is designed to push your limits.</p>
            <ul className="space-y-4">
              {['Science-backed training methodologies','Holistic approach to fitness and nutrition','Community-driven accountability system'].map((text,i) => (
                <li key={i} className="flex items-start gap-3 text-[#F2F2F2]">
                  <span className="w-5 h-5 rounded-full bg-[#C8FF00]/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#C8FF00" strokeWidth="3"><polyline points="20,6 9,17 4,12" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </span>
                  {text}
                </li>
              ))}
            </ul>
          </div>
          <div className="placeholder-img rounded-lg h-[350px] sm:h-[450px] md:h-[500px] border border-[#2A2A2A] flex items-center justify-center">
            <span className="text-[#6B6B6B] text-sm uppercase tracking-widest">Your Photo Here</span>
          </div>
        </div>
      </FadeInSection>
    );

    /* ---------- PROGRAMS ---------- */
    const ProgramsSection = () => {
      const programs = [
        { icon:'🏋️', title:'Strength & Conditioning', desc:'Build raw power and functional muscle with periodized programming.', duration:'12 Weeks', color:'#C8FF00' },
        { icon:'🔥', title:'HIIT & Cardio', desc:'Torch calories and boost endurance with high-intensity intervals.', duration:'8 Weeks', color:'#FF3B00' },
        { icon:'🎯', title:'Personal Training', desc:'One-on-one sessions tailored to your unique goals and biomechanics.', duration:'Ongoing', color:'#C8FF00' },
        { icon:'🥗', title:'Nutrition Coaching', desc:'Custom meal plans and macro guidance to fuel your performance.', duration:'16 Weeks', color:'#FF3B00' },
      ];
      return (
        <FadeInSection id="programs" className="py-20 md:py-28 px-4 max-w-7xl mx-auto" stagger>
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] block text-center mb-4">Our Programs</span>
          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">Find Your Perfect Plan</h2>
          <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
            {programs.map((p,i) => (
              <div key={i} className="program-card bg-[#141414] rounded-xl p-6 sm:p-8 flex flex-col gap-4 cursor-pointer group">
                <span className="text-3xl">{p.icon}</span>
                <h3 className="font-display text-2xl text-[#F2F2F2]">{p.title}</h3>
                <p className="text-[#6B6B6B] text-sm leading-relaxed flex-grow">{p.desc}</p>
                <span className="inline-block px-3 py-1.5 rounded-full text-xs uppercase tracking-wider border" style={{ borderColor: p.color, color: p.color }}>{p.duration}</span>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    /* ---------- COACHES ---------- */
    const CoachesSection = () => {
      const coaches = [
        { name:'Marcus Stone', specialty:'Strength & Powerlifting', initials:'MS' },
        { name:'Elena Voss', specialty:'HIIT & Functional Fitness', initials:'EV' },
        { name:'David Kim', specialty:'Nutrition & Body Recomp', initials:'DK' },
      ];
      return (
        <FadeInSection id="coaches" className="py-20 md:py-28 px-4 max-w-7xl mx-auto" stagger>
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] block text-center mb-4">Our Team</span>
          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">Meet Your Coaches</h2>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {coaches.map((c,i) => (
              <div key={i} className="coach-card bg-[#141414] rounded-xl overflow-hidden">
                <div className="placeholder-img h-72 sm:h-80 flex items-center justify-center">
                  <span className="font-display text-6xl text-[#6B6B6B]/40">{c.initials}</span>
                </div>
                <div className="p-6 text-center">
                  <h3 className="font-display text-2xl text-[#F2F2F2] mb-1">{c.name}</h3>
                  <p className="text-[#6B6B6B] text-sm mb-4">{c.specialty}</p>
                  <div className="flex justify-center gap-4">
                    {['T','I','L'].map(l => <span key={l} className="w-9 h-9 rounded-full bg-[#1a1a1a] border border-[#2A2A2A] flex items-center justify-center text-[#6B6B6B] text-xs hover:border-[#C8FF00] hover:text-[#C8FF00] cursor-pointer">{l}</span>)}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    /* ---------- TESTIMONIALS ---------- */
    const TestimonialsSection = () => {
      const testimonials = [
        { quote:'I lost 15kg in 3 months and gained confidence I never knew I had. The coaches genuinely care.', name:'Sarah Mitchell', result:'Lost 15kg in 3 months', initials:'SM' },
        { quote:'The personalized programming took my deadlift from 140kg to 200kg. Life-changing results.', name:'James Rodriguez', result:'Added 60kg to deadlift', initials:'JR' },
        { quote:'Finally found a gym that feels like family. The nutrition coaching transformed my relationship with food.', name:'Priya Kapoor', result:'Complete body recomposition', initials:'PK' },
      ];
      return (
        <FadeInSection id="testimonials" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] block text-center mb-4">Testimonials</span>
          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">Real People, Real Results</h2>
          <div className="testimonials-scroll grid md:grid-cols-3 gap-6">
            {testimonials.map((t,i) => (
              <div key={i} className="bg-[#141414] border border-[#2A2A2A] rounded-xl p-6 sm:p-8 flex flex-col gap-5">
                <div className="flex gap-1"><span className="text-[#C8FF00]">★★★★★</span></div>
                <p className="text-[#F2F2F2] leading-relaxed italic flex-grow">“{t.quote}”</p>
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-full placeholder-img flex items-center justify-center border border-[#2A2A2A]"><span className="font-display text-lg text-[#6B6B6B]">{t.initials}</span></div>
                  <div>
                    <p className="font-semibold text-[#F2F2F2] text-sm">{t.name}</p>
                    <p className="text-[#C8FF00] text-xs uppercase tracking-widest">{t.result}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    /* ---------- PRICING ---------- */
    const PricingSection = () => {
      const plans = [
        { name:'Starter', price:49, features:['3 sessions/month','Basic nutrition guide','Group class access','Email support'], featured:false },
        { name:'Pro', price:99, features:['12 sessions/month','Custom meal plan','1-on-1 coaching','Priority booking','Body composition scans'], featured:true },
        { name:'Elite', price:199, features:['Unlimited sessions','Personalized programming','24/7 coach access','Monthly progress reviews','Supplement guidance','Exclusive workshops'], featured:false },
      ];
      return (
        <FadeInSection id="pricing" className="py-20 md:py-28 px-4 max-w-7xl mx-auto" stagger>
          <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] block text-center mb-4">Pricing</span>
          <h2 className="font-display text-4xl sm:text-5xl md:text-6xl text-center text-[#F2F2F2] mb-14">Invest in Yourself</h2>
          <div className="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
            {plans.map((p,i) => (
              <div key={i} className={`pricing-card bg-[#141414] rounded-xl p-8 flex flex-col relative ${p.featured ? 'featured ring-1 ring-[#C8FF00]/40' : ''}`}>
                {p.featured && <span className="absolute -top-3.5 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-[#C8FF00] text-[#0a0a0a] text-xs font-bold uppercase tracking-wider rounded-full">Most Popular</span>}
                <h3 className="font-display text-3xl text-[#F2F2F2] mb-2">{p.name}</h3>
                <div className="flex items-baseline gap-1 mb-6">
                  <span className="text-[#6B6B6B] text-lg">$</span>
                  <span className="font-display text-5xl text-[#F2F2F2]">{p.price}</span>
                  <span className="text-[#6B6B6B]">/mo</span>
                </div>
                <ul className="space-y-3 mb-8 flex-grow">
                  {p.features.map((f,j) => (
                    <li key={j} className="flex items-center gap-2 text-[#6B6B6B] text-sm">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C8FF00" strokeWidth="3"><polyline points="20,6 9,17 4,12" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      {f}
                    </li>
                  ))}
                </ul>
                <button className={`w-full py-3.5 rounded font-semibold text-sm uppercase tracking-wider border-none cursor-pointer transition-all ${p.featured ? 'bg-[#C8FF00] text-[#0a0a0a] hover:bg-[#b8e600]' : 'bg-transparent border-2 border-[#F2F2F2]/20 text-[#F2F2F2] hover:border-[#C8FF00] hover:text-[#C8FF00]'}`}>Choose {p.name}</button>
              </div>
            ))}
          </div>
        </FadeInSection>
      );
    };

    /* ---------- CTA BANNER ---------- */
    const CTABanner = () => (
      <FadeInSection className="py-20 md:py-24">
        <div className="bg-[#C8FF00] cta-pattern relative overflow-hidden">
          <div className="max-w-4xl mx-auto text-center px-4 py-16 md:py-20 relative z-10">
            <h2 className="font-display text-4xl sm:text-5xl md:text-7xl text-[#0a0a0a] leading-[0.9] mb-6">READY TO CHANGE<br/>EVERYTHING?</h2>
            <p className="text-[#0a0a0a]/70 text-lg mb-10 max-w-xl mx-auto">Your transformation starts with a single decision. Take the first step today.</p>
            <button onClick={() => document.getElementById('contact')?.scrollIntoView({ behavior:'smooth' })} className="px-10 py-4 bg-[#0a0a0a] text-[#C8FF00] font-bold text-base uppercase tracking-wider rounded border-none cursor-pointer hover:bg-[#1a1a1a] transition-all">Get Started Now</button>
          </div>
        </div>
      </FadeInSection>
    );

    /* ---------- CONTACT / FOOTER ---------- */
    const ContactSection = () => {
      const [formData, setFormData] = useState({ name:'', email:'', message:'' });
      const [sent, setSent] = useState(false);
      const handleSubmit = (e) => { e.preventDefault(); setSent(true); setTimeout(() => { setSent(false); setFormData({ name:'', email:'', message:'' }); }, 3000); };
      return (
        <FadeInSection id="contact" className="py-20 md:py-28 px-4 max-w-7xl mx-auto">
          <div className="grid md:grid-cols-2 gap-12">
            <div>
              <span className="text-xs uppercase tracking-[0.2em] text-[#C8FF00] block mb-4">Get in Touch</span>
              <h2 className="font-display text-4xl sm:text-5xl text-[#F2F2F2] mb-8">Let's Talk</h2>
              <form onSubmit={handleSubmit} className="space-y-5">
                <div><label className="block text-xs uppercase tracking-widest text-[#6B6B6B] mb-2">Name</label><input type="text" name="name" value={formData.name} onChange={e => setFormData({...formData, name:e.target.value})} required className="w-full bg-[#141414] border border-[#2A2A2A] rounded-lg px-4 py-3 text-[#F2F2F2] focus:border-[#C8FF00] outline-none" placeholder="Your name"/></div>
                <div><label className="block text-xs uppercase tracking-widest text-[#6B6B6B] mb-2">Email</label><input type="email" name="email" value={formData.email} onChange={e => setFormData({...formData, email:e.target.value})} required className="w-full bg-[#141414] border border-[#2A2A2A] rounded-lg px-4 py-3 text-[#F2F2F2] focus:border-[#C8FF00] outline-none" placeholder="you@email.com"/></div>
                <div><label className="block text-xs uppercase tracking-widest text-[#6B6B6B] mb-2">Message</label><textarea name="message" value={formData.message} onChange={e => setFormData({...formData, message:e.target.value})} required rows="4" className="w-full bg-[#141414] border border-[#2A2A2A] rounded-lg px-4 py-3 text-[#F2F2F2] focus:border-[#C8FF00] outline-none resize-none" placeholder="Tell us about your goals..."/></div>
                <button type="submit" disabled={sent} className="w-full py-3.5 bg-[#FF3B00] text-white font-semibold text-sm uppercase tracking-wider rounded-lg border-none cursor-pointer hover:bg-[#e63500] transition-all disabled:opacity-50">{sent ? 'Message Sent! ✅' : 'Send Message'}</button>
              </form>
            </div>
            <div className="flex flex-col justify-center gap-8">
              <div><p className="text-xs uppercase tracking-widest text-[#6B6B6B] mb-1">Location</p><p className="text-[#F2F2F2] text-lg">123 Fitness Avenue<br/>New York, NY 10001</p></div>
              <div><p className="text-xs uppercase tracking-widest text-[#6B6B6B] mb-1">Phone</p><p className="text-[#F2F2F2] text-lg">(555) 123-4567</p></div>
              <div><p className="text-xs uppercase tracking-widest text-[#6B6B6B] mb-1">Email</p><p className="text-[#F2F2F2] text-lg">hello@fitpro.co</p></div>
              <div className="flex gap-4 mt-4">
                {['Twitter','Instagram','YouTube','LinkedIn'].map(s => <span key={s} className="text-sm text-[#6B6B6B] hover:text-[#C8FF00] cursor-pointer uppercase tracking-wider">{s}</span>)}
              </div>
            </div>
          </div>
          <div className="mt-16 pt-8 border-t border-[#2A2A2A] flex flex-col sm:flex-row justify-between items-center gap-4">
            <p className="text-[#6B6B6B] text-sm">© 2024 FitPro. All rights reserved.</p>
            <div className="flex gap-6">
              <span className="text-xs text-[#6B6B6B] hover:text-[#F2F2F2] cursor-pointer">Privacy Policy</span>
              <span className="text-xs text-[#6B6B6B] hover:text-[#F2F2F2] cursor-pointer">Terms of Service</span>
            </div>
          </div>
        </FadeInSection>
      );
    };

    /* ---------- MAIN APP ---------- */
    const FitProApp = () => (
      <div className="min-h-screen bg-[#0a0a0a]">
        <Navbar />
        <HeroSection />
        <StatsBar />
        <AboutSection />
        <ProgramsSection />
        <CoachesSection />
        <TestimonialsSection />
        <PricingSection />
        <CTABanner />
        <ContactSection />
      </div>
    );

    /* ---------- RENDER ---------- */
    const App = () => (
      <BrowserRouter>
        <Routes>
          <Route path="*" element={<FitProApp />} />
        </Routes>
      </BrowserRouter>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
