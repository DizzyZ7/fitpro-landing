    const scrollToSection = (id) => {

    const useInView = (options = {}) => {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const element = ref.current;
        if (!element) return;

        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsInView(true);
              if (options.once !== false) observer.unobserve(element);
            } else if (options.once === false) {
              setIsInView(false);
            }
          },
          {
            threshold: options.threshold || 0.15,
            rootMargin: options.rootMargin || '0px 0px -50px 0px'
          }
        );

        observer.observe(element);
        return () => observer.disconnect();
      }, [options.threshold, options.rootMargin, options.once]);

      return [ref, isInView];
    };

    const useCountUp = (target, duration = 1600, startCounting = false) => {
      const numeric = Number(String(target).replace(/[^\d]/g, '')) || 0;
      const [count, setCount] = useState(0);
      const rafRef = useRef(null);
      const startTimeRef = useRef(null);

      useEffect(() => {
        if (!startCounting) {
          setCount(0);
          return;
        }

        const animate = (timestamp) => {
          if (!startTimeRef.current) startTimeRef.current = timestamp;
          const elapsed = timestamp - startTimeRef.current;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);

          setCount(Math.floor(eased * numeric));

          if (progress < 1) {
            rafRef.current = requestAnimationFrame(animate);
          } else {
            setCount(numeric);
          }
        };

        rafRef.current = requestAnimationFrame(animate);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          startTimeRef.current = null;
        };
      }, [numeric, duration, startCounting]);

      return count;
    };

    const FitProApp = () => {
      const savedLang = localStorage.getItem('fitpro_lang');
      const browserLang = navigator.language && navigator.language.toLowerCase().startsWith('ru') ? 'ru' : 'en';
      const [lang, setLangState] = useState(savedLang || browserLang);
      const t = DATA[lang] || DATA.ru;

      const setLang = (code) => {
        setLangState(code);
        localStorage.setItem('fitpro_lang', code);
      };

      useEffect(() => {
        document.documentElement.lang = t.htmlLang;
      }, [t.htmlLang]);

      useEffect(() => {
        const hash = window.location.hash.replace('#', '');
        if (hash) setTimeout(() => scrollToSection(hash), 300);
      }, []);

      return (
        <div className="min-h-screen bg-[#0a0a0a] font-body">
          <Navbar lang={lang} setLang={setLang} t={t} />
          <HeroSection t={t} />
          <StatsBar t={t} />
          <AboutSection t={t} />
          <ProgramsSection t={t} />
          <DeveloperSection t={t} />
          <TestimonialsSection t={t} />
          <PricingSection t={t} />
          <CTABanner t={t} />
          <ContactSection t={t} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FitProApp />);

    console.log('%c🏋️ FitPro Ready — RU/EN + Developer Contacts', 'font-size: 18px; color: #C8FF00; font-weight: bold;');
  </script>
</body>
</html>
